      When in doubt, HODL and trust the process.
      <cite>— Halley553</cite>
    </blockquote>
    <p>
      There is a particular kind of silence that sets in around year two of
      holding a position you actually believe in. The early excitement is gone.
      The price moves no longer feel like news. What's left is the practice of
      doing nothing, on purpose, for a long time.
    </p>
    <h2>What HODLing is</h2>
    <p>
      HODL — famously a misspelling of <em>hold</em> — became a meme because it was
      honest. It admitted that the strategy is not clever. You buy something, and
      then you keep it. The discipline isn't in the buying; it's in everything that
      comes after.
    </p>
    <h2>Why process beats thesis</h2>
    <p>
      Theses come and go. What lasts is the process: keep buying small amounts,
      keep reading, and don't sell into fear. A clean process tolerates a messy
      thesis. The reverse is how people end up reading old tweets and wincing.
    </p>
